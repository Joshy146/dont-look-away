<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Look Away</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }
        canvas {
            border: 2px solid #222;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            background-color: #0a0a0a;
            cursor: none; /* Hides mouse so we can track flashlight direction */
        }
        #ui-overlay {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>DON'T LOOK AWAY</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui-overlay">Use WASD to move. Aim your flashlight with the MOUSE. Escape to the green hatch.</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME STATE ---
let gameOver = false;
let gameWon = false;

// --- PLAYER SETUP ---
const player = {
    x: 100,
    y: 300,
    radius: 12,
    speed: 2.5,
    angle: 0 // In radians, looking towards the mouse
};

// --- MONSTER SETUP ---
const monster = {
    x: 700,
    y: 300,
    radius: 15,
    speed: 1.8, // Slightly slower than player, but never stops if you look away
    isSeen: false
};

// --- GOAL SETUP ---
const escapeHatch = {
    x: 750,
    y: 50,
    radius: 20
};

// --- FLASHLIGHT CONFIG ---
const flashlight = {
    coneAngle: 0.6, // The width of the beam (roughly 35 degrees)
    distance: 300   // How far the light cuts into the dark
};

// --- INPUT TRACKING ---
const keys = {};
const mouse = { x: 0, y: 0 };

window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

// --- CORE MATHEMATICAL CHECK ---
function checkIsMonsterSeen() {
    // 1. Calculate vector from player to monster
    const dx = monster.x - player.x;
    const dy = monster.y - player.y;
    const distanceToMonster = Math.sqrt(dx * dx + dy * dy);

    // If monster is too far away, light can't reach it anyway
    if (distanceToMonster > flashlight.distance) {
        return false;
    }

    // 2. Find the absolute angle from player to monster
    let angleToMonster = Math.atan2(dy, dx);

    // 3. Find the difference between flashlight beam direction and monster angle
    let angleDiff = player.angle - angleToMonster;

    // Normalize angle difference to sit between -PI and +PI
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;

    // 4. Is the monster within half of our total beam cone width?
    return Math.abs(angleDiff) < (flashlight.coneAngle / 2);
}

// --- GAME LOOP ---
function update() {
    if (gameOver || gameWon) return;

    // 1. Handle Player Movement
    if (keys['w'] && player.y > player.radius) player.y -= player.speed;
    if (keys['s'] && player.y < canvas.height - player.radius) player.y += player.speed;
    if (keys['a'] && player.x > player.radius) player.x -= player.speed;
    if (keys['d'] && player.x < canvas.width - player.radius) player.x += player.speed;

    // 2. Track where player is looking (towards mouse)
    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

    // 3. Run the AI Look-Away Logic
    monster.isSeen = checkIsMonsterSeen();

    if (!monster.isSeen) {
        // Stalk towards player
        const mDx = player.x - monster.x;
        const mDy = player.y - monster.y;
        const dist = Math.sqrt(mDx * mDx + mDy * mDy);
        
        monster.x += (mDx / dist) * monster.speed;
        monster.y += (mDy / dist) * monster.speed;
    }

    // 4. Collision Checking
    const distToMonster = Math.sqrt((player.x - monster.x)**2 + (player.y - monster.y)**2);
    if (distToMonster < player.radius + monster.radius) {
        gameOver = true;
    }

    const distToExit = Math.sqrt((player.x - escapeHatch.x)**2 + (player.y - escapeHatch.y)**2);
    if (distToExit < player.radius + escapeHatch.radius) {
        gameWon = true;
    }
}

function draw() {
    // Clear viewport with deep void color
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // --- DRAW LIGHT LAYER (Destination-Over Masking) ---
    // Save the dark state
    ctx.save();
    
    // Create the Flashlight Cone geometry
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.arc(
        player.x, player.y, 
        flashlight.distance, 
        player.angle - (flashlight.coneAngle / 2), 
        player.angle + (flashlight.coneAngle / 2)
    );
    ctx.closePath();
    
    // Clip drawing area strictly to the flashlight cone
    ctx.clip();

    // Inside this clipped zone, everything gets drawn brightly lit
    // Floor texture approximation inside light
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw escape hatch if inside beam
    ctx.beginPath();
    ctx.arc(escapeHatch.x, escapeHatch.y, escapeHatch.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#00ff55';
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#003311';
    ctx.stroke();

    // Draw Monster if caught in beam
    if (monster.isSeen) {
        ctx.beginPath();
        ctx.arc(monster.x, monster.y, monster.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ff3333'; // Deep crimson when caught
        ctx.fill();
        // Spooky glowing center
        ctx.beginPath();
        ctx.arc(monster.x, monster.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
    }

    ctx.restore(); // Restore darkness to the rest of the canvas

    // --- DRAW PERMANENT OBJECTS (Things visible in the dark) ---
    // Draw Player (you can always see your own location outline)
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = '#888888';
    ctx.stroke();

    // Subtle flashlight beam guidelines
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(
        player.x + Math.cos(player.angle - flashlight.coneAngle/2) * 40,
        player.y + Math.sin(player.angle - flashlight.coneAngle/2) * 40
    );
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(
        player.x + Math.cos(player.angle + flashlight.coneAngle/2) * 40,
        player.y + Math.sin(player.angle + flashlight.coneAngle/2) * 40
    );
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.stroke();

    // --- GAME OVER OVERLAYS ---
    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff0000';
        ctx.font = "bold 36px 'Courier New'";
        ctx.textAlign = "center";
        ctx.fillText("YOU LOOKED AWAY", canvas.width / 2, canvas.height / 2);
        ctx.font = "16px 'Courier New'";
        ctx.fillStyle = '#888';
        ctx.fillText("Refresh the browser to try again.", canvas.width / 2, canvas.height / 2 + 50);
    }

    if (gameWon) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff55';
        ctx.font = "bold 36px 'Courier New'";
        ctx.textAlign = "center";
        ctx.fillText("YOU ESCAPED", canvas.width / 2, canvas.height / 2);
        ctx.font = "16px 'Courier New'";
        ctx.fillStyle = '#888';
        ctx.fillText("You survived the dark.", canvas.width / 2, canvas.height / 2 + 50);
    }
}

// --- ENGINE START ---
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Kick off the loop
requestAnimationFrame(loop);
    </script>
</body>
</html>
